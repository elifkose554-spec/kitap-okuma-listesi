<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitap Okuma Listesi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Kitap Okuma Listesi Uygulaması</h1>
    </header>
    <main>
        <section id="book-management">
            <h2>Kitap Yönetimi</h2>
            <button id="add-book-btn">Yeni Kitap Ekle</button>
            <div id="book-modal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2>Kitap Ekle</h2>
                    <form id="book-form">
                        <label for="book-title">Kitap Adı:</label>
                        <input type="text" id="book-title" required>
                        <label for="author">Yazar:</label>
                        <input type="text" id="author" required>
                        <input type="submit" value="Ekle">
                    </form>
                </div>
            </div>
            <ul id="book-list"></ul>
        </section>
        <section id="student-management">
            <h2>Öğrenci Yönetimi</h2>
            <button id="add-student-btn">Yeni Öğrenci Ekle</button>
            <ul id="student-list"></ul>
        </section>
        <section id="tracking">
            <h2>Kitap Takibi</h2>
            <button id="track-book-btn">Kitap Takip Et</button>
            <div id="tracking-list"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
